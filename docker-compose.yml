services:
  # ── PostgreSQL database ────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: weather_db
      POSTGRES_USER: weather_user
      POSTGRES_PASSWORD: weather_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather_user -d weather_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Python ETL pipeline (Backend) ──────────────────────────
  pipeline:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: weather_db
      DB_USER: weather_user
      DB_PASSWORD: weather_pass
      API_LATITUDE: 30.0444
      API_LONGITUDE: 31.2357
      SCHEDULE_HOUR: 6
    restart: on-failure:3

  # ── Streamlit Dashboard (Frontend) ─────────────────────────
  dashboard:
    build: .
    command: streamlit run src/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: weather_db
      DB_USER: weather_user
      DB_PASSWORD: weather_pass
    restart: unless-stopped

volumes:
  pgdata:
